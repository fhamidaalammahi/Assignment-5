<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>GitHub Issues Tracker</title>
  </head>
  <body
    class="bg-[#F8FAFC] geist min-h-[100vh] flex items-center justify-center"
  >
    <div
      class="bg-white border border-white shadow-lg rounded-lg p-8 flex flex-col justify-center gap-6 w-130 text-center"
    >
      <div>
        <img
          src="assets/assets/github-logo.png"
          alt="Github Logo"
          class="w-25 h-25 mx-auto mb-6"
        />
        <h1 class="mb-1 font-semibold text-2xl text-[#1F2937]">
          GitHub Issues Tracker
        </h1>
        <p class="text-[#64748B] text-base">Sign in to manage your issues</p>
      </div>
      <form class="text-left">
        <div class="mb-4">
          <label
            for="username"
            class="mb-2 font-medium text-base text-[#1F2937] block"
            >Username</label
          >
          <input
            id="username"
            type="text"
            placeholder="Enter Username"
            class="p-4 w-full rounded-lg border border-[#E4E4E7] placeholder:text-[#64748B] placeholder:text-base mb-1.5"
          />
          <span class="text-sm text-[#4A00FF]">Default: admin</span>
        </div>
        <div class="mb-6">
          <label
            for="password"
            class="mb-2 font-medium text-base text-[#1F2937] block"
            >Password</label
          >
          <input id="password" type="password"placeholder="Enter Password"class="p-4 w-full rounded-lg border border-[#E4E4E7] placeholder:text-[#64748B] placeholder:text-base mb-1.5"
          />
          <span class="text-sm text-[#4A00FF]">Default: admin123</span>
        </div>
        <input id="login-button"
          type="submit"
          value="Sign In"
          class="w-full text-white bg-[#4A00FF] cursor-pointer font-semibold text-base p-4 rounded-lg"
        />
      </form>
      <div class="flex items-center gap-2">
        <div class="w-full h-[1px] bg-[#E4E4E7]"></div>
        <span class="text-base text-[#1F2937]">OR</span>
        <div class="w-full h-[1px] bg-[#E4E4E7]"></div>
      </div>
      <div>
        <p class="mb-2 text-sm text-[#64748B]">Demo Credentials:</p>
        <div class="p-6 bg-[#F8FAFC] text-center rounded-lg">
          <p class="text-base">
            <span class="font-semibold">Username:</span> admin
          </p>
          <p class="text-base">
            <span class="font-semibold">Password:</span> admin123
          </p>
        </div>
      </div>
    </div>
    <script src="script/login.js"></script>
  </body>
</html>
