<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Github Issues Tracker</title>
  </head>
  <body class="min-h-[100vh] geist bg-[#F8FAFC]">
    <header
      class="px-10 py-4 flex items-center justify-between bg-white border-b-1 border-[#E9E9E9] mb-15"
    >
      <div class="flex items-center gap-1">
        <img src="assets/assets/github-logo.png" alt="Github Logo" class="w-9 h-9" />
        <h1 class="font-semibold text-2xl text-[#1F2937]">
          GitHub Issues Tracker
        </h1>
      </div>
      <div class="flex items-center gap-4">
        <div
          class="flex items-center gap-1 px-4 py-2 w-75 rounded-[4px] border border-[#E4E4E7]"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M14.5305 13.4694L11.5624 10.5C12.4524 9.3403 12.8678 7.8855 12.7246 6.43072C12.5814 4.97594 11.8901 3.63011 10.7911 2.66625C9.69203 1.70239 8.26751 1.19266 6.80648 1.24048C5.34544 1.2883 3.9573 1.89007 2.92364 2.92373C1.88998 3.95739 1.2882 5.34554 1.24039 6.80657C1.19257 8.2676 1.7023 9.69212 2.66616 10.7912C3.63002 11.8902 4.97585 12.5814 6.43063 12.7247C7.88541 12.8679 9.34021 12.4524 10.4999 11.5625L13.4705 14.5338C13.5403 14.6035 13.6231 14.6589 13.7143 14.6966C13.8054 14.7344 13.9031 14.7538 14.0018 14.7538C14.1005 14.7538 14.1981 14.7344 14.2893 14.6966C14.3805 14.6589 14.4633 14.6035 14.533 14.5338C14.6028 14.464 14.6581 14.3812 14.6959 14.29C14.7337 14.1989 14.7531 14.1012 14.7531 14.0025C14.7531 13.9038 14.7337 13.8061 14.6959 13.715C14.6581 13.6238 14.6028 13.541 14.533 13.4713L14.5305 13.4694ZM2.74991 7.00001C2.74991 6.15944 2.99917 5.33774 3.46617 4.63883C3.93316 3.93992 4.59692 3.39519 5.37351 3.07352C6.1501 2.75185 7.00463 2.66768 7.82905 2.83167C8.65347 2.99566 9.41075 3.40043 10.0051 3.9948C10.5995 4.58918 11.0043 5.34645 11.1683 6.17087C11.3322 6.99529 11.2481 7.84982 10.9264 8.62641C10.6047 9.403 10.06 10.0668 9.36109 10.5338C8.66218 11.0007 7.84049 11.25 6.99991 11.25C5.8731 11.2488 4.79277 10.8007 3.99599 10.0039C3.19921 9.20715 2.75107 8.12682 2.74991 7.00001Z"
              fill="#64748B"
            />
          </svg>

          <input
            id="search-field"
            type="text"
            placeholder="Search issues..."
            class="placeholder:text-base placeholder:text-[#64748B] text-base text-[#1F2937] border-none focus:outline-none"
          />
        </div>

        <button
          class="bg-[#4A00FF] px-4 py-2 text-white text-base font-semibold rounded-[4px] flex items-center gap-1"
        >
          <svg
            width="13"
            height="13"
            viewBox="0 0 13 13"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M12.5 6.25C12.5 6.44891 12.421 6.63968 12.2803 6.78033C12.1397 6.92098 11.9489 7 11.75 7H7V11.75C7 11.9489 6.92098 12.1397 6.78033 12.2803C6.63968 12.421 6.44891 12.5 6.25 12.5C6.05109 12.5 5.86032 12.421 5.71967 12.2803C5.57902 12.1397 5.5 11.9489 5.5 11.75V7H0.75C0.551088 7 0.360322 6.92098 0.21967 6.78033C0.0790177 6.63968 0 6.44891 0 6.25C0 6.05109 0.0790177 5.86032 0.21967 5.71967C0.360322 5.57902 0.551088 5.5 0.75 5.5H5.5V0.75C5.5 0.551088 5.57902 0.360322 5.71967 0.21967C5.86032 0.0790177 6.05109 0 6.25 0C6.44891 0 6.63968 0.0790177 6.78033 0.21967C6.92098 0.360322 7 0.551088 7 0.75V5.5H11.75C11.9489 5.5 12.1397 5.57902 12.2803 5.71967C12.421 5.86032 12.5 6.05109 12.5 6.25Z"
              fill="white"
            />
          </svg>
          <span>New Issue</span>
        </button>
      </div>
    </header>
    <main class="w-277.5 mx-auto">
      <div
        class="p-6 bg-white rounded-lg flex items-center gap-2 shadow-sm mb-4"
      >
        <button
          id="all-button"
          class="active text-[#64748B] cursor-pointer text-base font-medium rounded-[4px] border border-[#E4E4E7] hover:bg-[#4A00FF] hover:text-white transition-all duration-300 ease-out px-3 py-2 w-30 h-10"
        >
          All
        </button>
        <button
          id="open-button"
          class="text-[#64748B] cursor-pointer text-base font-medium rounded-[4px] border border-[#E4E4E7] hover:bg-[#4A00FF] hover:text-white transition-all duration-300 ease-out px-3 py-2 w-30 h-10"
        >
          Open
        </button>
        <button
          id="closed-button"
          class="text-[#64748B] cursor-pointer text-base font-medium rounded-[4px] border border-[#E4E4E7] hover:bg-[#4A00FF] hover:text-white transition-all duration-300 ease-out px-3 py-2 w-30 h-10"
        >
          Closed
        </button>
      </div>

      <div class="rounded-lg shadow-md overflow-hidden">
        <div
          class="bg-white p-6 flex items-center justify-between border-b border-[#E4E4E7]"
        >
          <div class="flex items-center gap-2">
            <div class="p-3 rounded-full bg-[#ECE4FF]">
              <svg
                width="28"
                height="27"
                viewBox="0 0 28 27"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M23.0456 3.95376C21.1576 2.06583 18.7521 0.780171 16.1334 0.259341C13.5147 -0.261489 10.8003 0.00590718 8.33357 1.02772C5.86682 2.04952 3.75846 3.77985 2.2751 5.9999C0.791739 8.21994 0 10.83 0 13.5C0 16.17 0.791739 18.7801 2.2751 21.0001C3.75846 23.2202 5.86682 24.9505 8.33357 25.9723C10.8003 26.9941 13.5147 27.2615 16.1334 26.7407C18.7521 26.2198 21.1576 24.9342 23.0456 23.0463C24.3086 21.7979 25.3113 20.3113 25.9957 18.6727C26.68 17.034 27.0324 15.2758 27.0324 13.5C27.0324 11.7242 26.68 9.96601 25.9957 8.32735C25.3113 6.68869 24.3086 5.20212 23.0456 3.95376ZM20.9206 6.07876C21.324 6.4801 21.6939 6.91361 22.0269 7.37501L18.6194 11.3863L15.7069 3.23501C17.6839 3.65669 19.496 4.64329 20.9231 6.07501L20.9206 6.07876ZM6.06438 6.07876C7.77694 4.35752 10.0364 3.28771 12.4531 3.05376L14.2231 8.01001L5.70813 6.45126C5.82438 6.32376 5.94313 6.19876 6.06688 6.07501L6.06438 6.07876ZM3.49438 16.7125C2.70242 14.2335 2.85377 11.5493 3.91938 9.17501L9.09938 10.125L3.49438 16.7125ZM6.06313 20.925C5.66142 20.5222 5.29312 20.0875 4.96188 19.625L8.36938 15.6138L11.2819 23.765C9.30532 23.343 7.49371 22.3565 6.06688 20.925H6.06313ZM10.6081 12.9738L12.5056 10.7425L15.3881 11.2688L16.3731 14.0263L14.4769 16.2575L11.5944 15.7313L10.6081 12.9738ZM20.9194 20.925C19.2065 22.6458 16.9473 23.7155 14.5306 23.95L12.7631 19L21.2806 20.555C21.1644 20.6763 21.0456 20.8013 20.9231 20.925H20.9194ZM17.8894 16.875L23.4944 10.2875C24.2865 12.7666 24.1347 15.451 23.0681 17.825L17.8894 16.875Z"
                  fill="#4A00FF"
                />
              </svg>
            </div>
            <div>
              <h2
                id="issue-count"
                class="text-[#1F2937] text-xl font-semibold"
              ></h2>
              <p class="text-base text-[#64748B]">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
              <div class="w-3 h-3 bg-[#00A96E] rounded-full"></div>
              <span class="text-[#1F2937] text-base font-medium">Open</span>
            </div>
            <div class="flex items-center gap-2">
              <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div>
              <span class="text-[#1F2937] text-base font-medium">Closed</span>
            </div>
          </div>
        </div>
        <div
          id="cards-container"
          class="bg-[#FBFBFB] p-6 grid grid-cols-4 gap-3"
        >
          <!-- CARD -->
        </div>
      </div>
    </main>
    <dialog id="my_modal_1" class="modal">
      <div class="modal-box p-8">
        <h3
          id="modal-title"
          class="text-2xl font-bold mb-2 text-[#1F2937]"
        ></h3>
        <div id="modal-author-info" class="flex items-center gap-2 mb-6"></div>
        <div id="modal-labels" class="flex items-center gap-1 mb-6"></div>
        <p id="modal-description" class="text-[#64748B] text base mb-6"></p>
        <div class="bg-[#F8FAFC] rounded-lg p-4 grid grid-cols-2">
          <div>
            <p class="text-[#64748B] text-base mb-1">Assignee:</p>
            <p
              id="modal-assignee"
              class="text-[#1F2937] font-semibold text-base"
            ></p>
          </div>
          <div>
            <p class="text-[#64748B] text-base mb-1">Priority:</p>
            <p
              id="modal-priority"
              class="text-[#1F2937] font-semibold text-base"
            ></p>
          </div>
        </div>
        <div class="modal-action">
          <form method="dialog">
            
            <button
              class="btn font-semibold text-base bg-[#4A00FF] cursor-pointer rounded-[4px] text-white px-4 py-3"
            >
              Close
            </button>
          </form>
        </div>
      </div>
    </dialog>
    <script src="script/home.js"></script>
  </body>
</html>
